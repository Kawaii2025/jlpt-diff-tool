<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日汉逐行对照阅读器｜N1听力专用</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", Meiryo, sans-serif;
    }
    body {
      background: #f5f7fa;
      padding: 24px;
    }
    .container {
      max-width: 1600px;
      margin: 0 auto;
    }
    .input-wrap {
      margin-bottom: 22px;
    }
    #source {
      width: 100%;
      height: 260px;
      padding: 14px;
      border: 1px solid #d1d9e6;
      border-radius: 8px;
      font-size: 15px;
      resize: vertical;
      line-height:1.6;
    }
    .btn-group{
      display:flex;
      gap:12px;
      margin-top:12px;
    }
    #buildBtn,#swapBtn {
      padding:10px 26px;
      color:#fff;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:15px;
    }
    #buildBtn{
      background:#2563eb;
    }
    #buildBtn:hover {
      background:#1d4ed8;
    }
    #swapBtn{
      background:#059669;
    }
    #swapBtn:hover{
      background:#047857;
    }
    .table-card {
      background:#fff;
      border-radius:8px;
      box-shadow:0 2px 14px #e2e8f0;
      overflow:hidden;
      margin-top:20px;
    }
    table {
      width:100%;
      border-collapse: collapse;
    }
    th,td {
      padding:15px 18px;
      border-bottom:1px solid #eee;
      vertical-align: top;
      line-height:1.7;
    }
    th {
      background:#eff6ff;
      color:#1e40af;
    }
    .idx {
      width:65px;
      background:#f8fafc;
      color:#666;
      text-align:center;
    }
    .colA {
      width:48%;
    }
    .colB {
      width:48%;
    }
    tbody tr:nth-child(even) td:not(.idx) {
      background:#f8fbff;
    }
    .empty-tip{color:#e53e3e}
  </style>
</head>
<body>
<div class="container">
  <div class="input-wrap">
    <textarea id="source" placeholder="全文档直接粘贴此处，格式：日文一行、中文一行，中间空行自动剔除"></textarea>
    <div class="btn-group">
      <button id="buildBtn">一键生成左右对照表格</button>
      <button id="swapBtn">互换左右（中日切换）</button>
    </div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th class="idx">序号</th>
          <th class="colA" id="titleLeft">中文译文</th>
          <th class="colB" id="titleRight">日文原文</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
const src = document.getElementById('source')
const btn = document.getElementById('buildBtn')
const swapBtn = document.getElementById('swapBtn')
const tbody = document.getElementById('tableBody')
const titleLeft = document.getElementById('titleLeft')
const titleRight = document.getElementById('titleRight')

let originData = []
let isSwap = false // 默认左中文右日文 false

function parseData() {
  let lines = src.value.split('\n')
    .map(item=>item.trim())
    .filter(item=>item!=='')
  originData = []
  tbody.innerHTML = ''
  for(let i=0; i<lines.length; i+=2){
    let jp = lines[i] || '<span class="empty-tip">缺日文</span>'
    let cn = lines[i+1] || '<span class="empty-tip">缺译文</span>'
    originData.push({jp,cn})
  }
  renderTable()
}

function renderTable(){
  tbody.innerHTML = ''
  originData.forEach((item,idx)=>{
    let leftTxt,rightTxt
    if(!isSwap){
      leftTxt = item.cn
      rightTxt = item.jp
      titleLeft.innerText='中文译文'
      titleRight.innerText='日文原文'
    }else{
      leftTxt = item.jp
      rightTxt = item.cn
      titleLeft.innerText='日文原文'
      titleRight.innerText='中文译文'
    }
    let tr = document.createElement('tr')
    tr.innerHTML = `
      <td class="idx">${idx+1}</td>
      <td class="colA">${leftTxt}</td>
      <td class="colB">${rightTxt}</td>
    `
    tbody.appendChild(tr)
  })
}

//切换左右
swapBtn.onclick = function(){
  isSwap = !isSwap
  renderTable()
}

parseData()
btn.onclick = parseData
</script>
</body>
</html>
